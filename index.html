<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alisha | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d0d11;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            margin-bottom: 20px;
            background: linear-gradient(135deg, #2c3e50, #0d0d11);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .subtitle {
            color: #f1c40f;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
        }
        p {
            color: #a0a0a0;
            max-width: 350px;
            line-height: 1.5;
            font-size: 1rem;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #f1c40f;
            color: #0d0d11;
            padding: 12px 28px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="avatar">✨</div>
    <div class="subtitle">Creator & Web Developer</div>
    <h1>Hi, I'm Alisha</h1>
    <p>Welcome to my personal portfolio hosted live on GitHub Pages!</p>
    <a href="#" class="btn">Explore Work</a>
</body>
</html>
